<script>
const STATE = {
  data: null,
  currentBrowser: 'chrome',
  searchTerm: '',
  dateFrom: null,
  dateTo: null,
  hideNoDate: false,
  showExperimental: false,
  sortBy: 'version-desc'
};

// Utility functions
function stripHtml(text) {
  return text.replace(/<[^>]*>/g, '').trim();
}

function truncateText(text, maxLength = 200) {
  if (!text) return '';
  return text.length > maxLength ? text.slice(0, maxLength) + '…' : text;
}

function highlightSearchTerm(text, searchTerm) {
  if (!searchTerm) return text;
  const regex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<span class="search-highlight">$1</span>');
}

function formatDate(dateString) {
  if (!dateString) return 'Unknown date';
  try {
    return new Date(dateString).toLocaleDateString('en-US', {
      year: 'numeric',
      month: 'short',
      day: 'numeric'
    });
  } catch (e) {
    return 'Unknown date';
  }
}

function compareVersions(a, b) {
  if (!a || !b) return 0;

  const cleanA = a.replace(/[≤≥<>=]/g, '').split('-')[0];
  const cleanB = b.replace(/[≤≥<>=]/g, '').split('-')[0];

  const na = cleanA.split('.').map(x => parseInt(x, 10)).filter(n => !Number.isNaN(n));
  const nb = cleanB.split('.').map(x => parseInt(x, 10)).filter(n => !Number.isNaN(n));
  const len = Math.max(na.length, nb.length);

  for (let i = 0; i < len; i++) {
    const va = na[i] || 0;
    const vb = nb[i] || 0;
    if (va !== vb) return va - vb;
  }
  return cleanA.localeCompare(cleanB);
}

// Render functions
function renderFeatureCard(feature) {
  const card = document.createElement('div');
  card.className = 'card feature-card mb-3';
  card.setAttribute('data-version', feature.version);

  const highlightedName = highlightSearchTerm(feature.name || feature.feature_id.split('.').pop(), STATE.searchTerm);
  const highlightedDescription = highlightSearchTerm(truncateText(feature.description), STATE.searchTerm);

  // Method + Type header
  const methodHeader = feature.type_name
    ? `<span class="type-name">${feature.type_name}</span>.<span class="method-name">${feature.method_name}</span>`
    : `<span class="method-name">${feature.method_name}</span>`;

  // Header badges (deprecated and experimental)
  const headerBadges = [];
  if (feature.version_removed) {
    headerBadges.push('<span class="badge bg-danger me-1"><i class="bi bi-x-circle me-1"></i>Deprecated</span>');
  }
  if (!feature.stable) {
    headerBadges.push('<span class="badge bg-warning text-dark me-1"><i class="bi bi-exclamation-triangle me-1"></i>Experimental</span>');
  }

  // Other stability indicators
  const stabilityBadges = [];
  if (feature.flags) {
    stabilityBadges.push('<span class="badge bg-info me-1"><i class="bi bi-flag me-1"></i>Flagged</span>');
  }
  if (feature.prefix) {
    stabilityBadges.push('<span class="badge bg-secondary me-1"><i class="bi bi-tag me-1"></i>Prefixed</span>');
  }
  if (feature.partial_implementation) {
    stabilityBadges.push('<span class="badge bg-warning text-dark me-1"><i class="bi bi-patch-check me-1"></i>Partial</span>');
  }
  if (feature.alternative_name) {
    stabilityBadges.push('<span class="badge bg-light text-dark me-1"><i class="bi bi-arrow-right me-1"></i>Alt: ${feature.alternative_name}</span>');
  }

  card.innerHTML = `
    <div class="card-body">
      <div class="d-flex align-items-start justify-content-between">
        <div class="flex-grow-1">
          <div class="d-flex align-items-center mb-2">
            <div class="method-header me-2">${methodHeader}</div>
            <div class="header-badges">
              ${headerBadges.join('')}
            </div>
          </div>
          <div class="mb-2">
            ${stabilityBadges.join('')}
          </div>
          <p class="card-text description-text text-muted mb-3">${highlightedDescription}</p>
          <div class="version-info">
            <p class="mb-2">
              <i class="bi bi-calendar-event me-1"></i>
              Added in <strong>${STATE.currentBrowser}</strong> v<strong>${feature.version || 'unknown'}</strong>
              on <strong>${formatDate(feature.date)}</strong>
              ${feature.version_removed ? ` → Removed in v<strong>${feature.version_removed}</strong> on <strong>${formatDate(feature.date_removed)}</strong>` : ''}
            </p>
            ${feature.notes ? `
              <div class="alert alert-warning alert-sm mb-2" role="alert">
                <i class="bi bi-info-circle me-1"></i>
                <small>${feature.notes}</small>
              </div>
            ` : ''}
            <div class="d-flex gap-2">
              ${feature.mdn_url ? `
                <a href="${feature.mdn_url}"
                   class="btn btn-sm btn-info"
                   target="_blank"
                   rel="noopener noreferrer"
                   title="View on MDN">
                  <i class="bi bi-book me-1"></i>MDN Docs
                </a>
              ` : ''}
              ${feature.spec_url ? `
                <a href="${feature.spec_url}"
                   class="btn btn-sm btn-primary"
                   target="_blank"
                   rel="noopener noreferrer"
                   title="View Specification">
                  <i class="bi bi-file-text me-1"></i>Spec
                </a>
              ` : ''}
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  return card;
}


function renderFeatureList(features, container) {
  container.innerHTML = '';

  if (features.length === 0) {
    container.innerHTML = `
      <div class="text-center py-5">
        <i class="bi bi-search display-1 text-muted"></i>
        <h4 class="mt-3 text-muted">No features found</h4>
        <p class="text-muted">Try adjusting your search criteria or filters.</p>
      </div>
    `;
    return;
  }

  const fragment = document.createDocumentFragment();
  features.forEach(feature => {
    fragment.appendChild(renderFeatureCard(feature));
  });

  container.appendChild(fragment);
}

// Filter and sort functions
function getCurrentFilters() {
  return {
    searchTerm: document.getElementById('search').value.toLowerCase(),
    dateFrom: document.getElementById('dateFrom').value || null,
    dateTo: document.getElementById('dateTo').value || null,
    hideNoDate: document.getElementById('hideNoDate').checked,
    showExperimental: document.getElementById('showExperimental').checked,
    sortBy: document.getElementById('sortBy').value
  };
}

function applyFilters(features) {
  const filters = getCurrentFilters();

  let filtered = features.filter(feature => {
    // Search filter
    if (filters.searchTerm) {
      const searchable = [
        feature.name || '',
        feature.feature_id || '',
        feature.description || ''
      ].join(' ').toLowerCase();

      if (!searchable.includes(filters.searchTerm)) {
        return false;
      }
    }

    // Stability filter
    if (!filters.showExperimental && !feature.stable) {
      return false;
    }

    // Date filters
    if (filters.hideNoDate && !feature.date) {
      return false;
    }

    if (filters.dateFrom && feature.date && feature.date < filters.dateFrom) {
      return false;
    }

    if (filters.dateTo && feature.date && feature.date > filters.dateTo) {
      return false;
    }

    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    switch (filters.sortBy) {
      case 'version-desc':
        return compareVersions(b.version || '0', a.version || '0');

      case 'version-asc':
        return compareVersions(a.version || '0', b.version || '0');

      default:
        return 0;
    }
  });

  return filtered;
}

// Debounced update function for better performance
let updateTimeout = null;
function updateDisplay() {
  if (!STATE.data) return;

  // Clear any pending update
  if (updateTimeout) {
    clearTimeout(updateTimeout);
  }

  // Use requestAnimationFrame for smooth updates
  updateTimeout = setTimeout(() => {
    const features = STATE.data[STATE.currentBrowser] || [];
    const filtered = applyFilters(features);

    const container = document.getElementById(`${STATE.currentBrowser}-features`);
    renderFeatureList(filtered, container);

    document.getElementById('resultCount').textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;
  }, 0);
}

// Event handlers
function setupEventListeners() {
  // Search and filter inputs (non-checkbox)
  ['search', 'dateFrom', 'dateTo', 'sortBy'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateDisplay);
  });

  // Checkbox inputs with async handling
  ['hideNoDate', 'showExperimental'].forEach(id => {
    document.getElementById(id).addEventListener('change', (e) => {
      // Immediately update the visual state
      e.target.checked = e.target.checked;

      // Update display asynchronously
      setTimeout(() => {
        updateDisplay();
      }, 0);
    });
  });

  // Clear search button
  document.getElementById('clearSearch').addEventListener('click', () => {
    document.getElementById('search').value = '';
    // Trigger input event to maintain consistency
    document.getElementById('search').dispatchEvent(new Event('input'));
  });

  // Clear date buttons
  document.getElementById('clearDateFrom').addEventListener('click', () => {
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateFrom').dispatchEvent(new Event('input'));
  });

  document.getElementById('clearDateTo').addEventListener('click', () => {
    document.getElementById('dateTo').value = '';
    document.getElementById('dateTo').dispatchEvent(new Event('input'));
  });

  // Browser tabs
  ['chrome', 'firefox', 'safari', 'edge'].forEach(browser => {
    document.getElementById(`${browser}-tab`).addEventListener('shown.bs.tab', () => {
      STATE.currentBrowser = browser;
      updateDisplay();
    });
  });

  // Copy to clipboard functionality
  document.body.addEventListener('click', (e) => {
    const copyButton = e.target.closest('[data-copy]');
    if (copyButton) {
      const text = copyButton.getAttribute('data-copy');
      navigator.clipboard.writeText(text).then(() => {
        // Visual feedback
        const originalClasses = copyButton.className;
        copyButton.className = originalClasses.replace('bg-secondary', 'bg-success');
        copyButton.innerHTML = '<i class="bi bi-check me-1"></i>Copied!';

        setTimeout(() => {
          copyButton.className = originalClasses;
          copyButton.innerHTML = '<i class="bi bi-clipboard me-1"></i>' + text;
        }, 1500);
      }).catch(err => {
        console.error('Failed to copy text: ', err);
      });
    }
  });
}

// Main initialization
async function initialize() {
  try {
    setupEventListeners();

    const response = await fetch('./public/data/index.json');
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }

    const data = await response.json();
    STATE.data = data.browsers;
    STATE.releases = data.releases;

    // Hide loading spinner
    document.getElementById('loadingSpinner').style.display = 'none';

    // Initial render
    updateDisplay();

    console.log('Data loaded successfully:', {
      generated_at: data.generated_at,
      browsers: Object.keys(data.browsers),
      totalFeatures: Object.values(data.browsers).reduce((sum, features) => sum + features.length, 0),
      releases: Object.keys(data.releases || {})
    });

  } catch (error) {
    console.error('Failed to load data:', error);

    // Hide loading spinner and show error
    document.getElementById('loadingSpinner').style.display = 'none';
    document.getElementById('errorMessage').classList.remove('d-none');
    document.getElementById('errorText').textContent = `Failed to load data: ${error.message}`;
  }
}

// Start the application
document.addEventListener('DOMContentLoaded', initialize);
</script>
